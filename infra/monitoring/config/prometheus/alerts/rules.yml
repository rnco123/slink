# Alert rules — Saludlink. Kept intentionally conservative: page on things that
# indicate real user-facing impact, warn on saturation trends. No PHI in labels.
groups:
  - name: targets
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus has failed to scrape {{ $labels.instance }} for >2m."

  - name: website
    rules:
      - alert: SiteProbeFailing
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Blackbox probe failing: {{ $labels.instance }}"
          description: "The synthetic HTTP probe for {{ $labels.instance }} has failed for >2m."

      - alert: SiteSlowResponse
        expr: probe_http_duration_seconds{phase="processing"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response from {{ $labels.instance }}"
          description: "Server processing time >2s for >5m."

      - alert: TLSCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) < 86400 * 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate for {{ $labels.instance }} expires in <14 days"
          description: "Renew the certificate for {{ $labels.instance }}."

  - name: host
    rules:
      - alert: HostHighCpu
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU >90% for >10m."

      - alert: HostLowDisk
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Less than 10% filesystem space remaining."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage >90% for >10m."

  - name: datastores
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter reports the database down"
          description: "pg_up == 0 — the app database is unreachable."

      - alert: PostgresTooManyConnections
        expr: sum by (instance) (pg_stat_activity_count) > (pg_settings_max_connections * 0.85)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection pool near limit"
          description: "Active connections >85% of max_connections for >5m."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter reports the cache down"
          description: "redis_up == 0 — the event bus / workflow engine backing store is unreachable."

      - alert: RedisHighMemory
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 90 and redis_memory_max_bytes > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory >90% of maxmemory"
          description: "Redis is close to its maxmemory limit; eviction/queue loss risk."
