# Blackbox HTTP probe targets (file service discovery).
# Prometheus WATCHES this file — edits are hot-reloaded, no restart needed.
#
# DEV: probes the local dev servers via host.docker.internal.
# PROD (one-line flip after the site is live): replace the dev targets below with
# the public URLs, e.g.
#   - targets:
#       - https://saludlinkusa.com/api/health
#       - https://manage.saludlinkusa.com/health
#     labels:
#       env: production
# (For TLS cert-expiry monitoring, also add the https roots to blackbox-tls.yml.)
- targets:
    - http://host.docker.internal:8000        # storefront
    - http://host.docker.internal:9000/health # medusa backend health
  labels:
    env: development
