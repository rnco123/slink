# Loki — single-binary, filesystem-backed config for self-hosted logging.
# Suitable for dev/staging and small prod; scale out to object storage (S3) for
# large prod (see README "Production exposure / scaling").
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: ${LOKI_RETENTION_HOURS}
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  # Guardrail: keep per-stream cardinality sane so log labels never blow up.
  max_label_names_per_series: 15

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  enable_api: true

# Disable Grafana Labs usage reporting (privacy posture).
analytics:
  reporting_enabled: false
