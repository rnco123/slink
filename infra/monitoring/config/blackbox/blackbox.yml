# Blackbox exporter probe modules — Saludlink.
modules:
  http_2xx:
    prober: http
    timeout: 8s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [] # defaults to 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_ssl: false
      fail_if_not_ssl: false

  http_2xx_tls:
    prober: http
    timeout: 8s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_not_ssl: true # for production HTTPS endpoints

  http_post_2xx:
    prober: http
    timeout: 8s
    http:
      method: POST
      preferred_ip_protocol: ip4

  tcp_connect:
    prober: tcp
    timeout: 8s

  icmp:
    prober: icmp
    timeout: 8s
    icmp:
      preferred_ip_protocol: ip4
