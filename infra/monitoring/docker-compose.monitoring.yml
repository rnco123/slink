# =============================================================================
# Saludlink — Monitoring / observability stack
# -----------------------------------------------------------------------------
# Self-hosted metrics, logs, uptime and queue observability. Consumed later by a
# single Monitoring API (NestJS) that aggregates these tools for the admin panel.
#
# Run from this directory:
#   cp .env.monitoring.template .env
#   docker compose -f docker-compose.monitoring.yml --env-file .env up -d
#
# Networks
#   monitoring  internal-only; Prometheus scrapes exporters by service name here.
#   app         EXTERNAL — the app's own compose network (Postgres + Redis) so
#               the pg/redis exporters and Bull Board reach them without exposing
#               new host ports. Created by ../../docker-compose.yml.
#
# Exposure policy
#   Only admin UIs (Grafana, Uptime Kuma, Bull Board) publish a host port, and
#   only on ${BIND_ADDR} (127.0.0.1 in dev). Exporters + Prometheus + Loki are
#   internal. In staging/production publish NOTHING and route through the admin
#   subdomain behind auth/WAF (see README "Production exposure").
# =============================================================================

name: saludlink-monitoring

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  monitoring:
    driver: bridge
  app:
    external: true
    name: ${APP_NETWORK:-saludlink_default}

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  uptimekuma_data:

services:
  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection + TSDB. Scrapes every exporter below.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    user: root
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-lifecycle"
      - "--web.external-url=http://localhost:${PROMETHEUS_PORT:-9090}"
      - "--enable-feature=expand-external-labels"
    environment:
      MONITORING_ENV: ${MONITORING_ENV:-development}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    networks: [monitoring]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Alertmanager — routes/dedupes alerts fired by Prometheus rules.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      ALERT_SLACK_WEBHOOK_URL: ${ALERT_SLACK_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_SMTP_SMARTHOST: ${ALERT_SMTP_SMARTHOST:-}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-alertmanager@saludlinkusa.com}
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"
    networks: [monitoring]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Grafana — dashboards over Prometheus + Loki. The primary admin surface.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_ALLOW_SIGNUP:-false}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      # Serve Grafana's own /metrics for Prometheus self-monitoring.
      GF_METRICS_ENABLED: "true"
      # No phone-home / usage stats — privacy posture.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    networks: [monitoring]
    depends_on: [prometheus, loki]
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Node Exporter — host CPU/mem/disk/network metrics.
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks: [monitoring]
    logging: *default-logging
    # No published port — Prometheus scrapes node-exporter:9100 internally.

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter — metrics from the app's Postgres (via app network).
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${PG_EXPORTER_DSN:-postgresql://saludlink:saludlink_local@postgres:5432/medusa?sslmode=disable}
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    networks: [monitoring, app]
    logging: *default-logging
    # No published port — scraped at postgres-exporter:9187 internally.

  # ---------------------------------------------------------------------------
  # Redis Exporter — metrics from the app's Redis (via app network).
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR:-redis://redis:6379}
      REDIS_PASSWORD: ${REDIS_EXPORTER_PASSWORD:-}
    networks: [monitoring, app]
    logging: *default-logging
    # No published port — scraped at redis-exporter:9121 internally.

  # ---------------------------------------------------------------------------
  # cAdvisor — per-container resource metrics.
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [monitoring]
    logging: *default-logging
    # No published port by default — scraped at cadvisor:8080 internally.

  # ---------------------------------------------------------------------------
  # Blackbox Exporter — synthetic HTTP/TCP/ICMP probes of the public site.
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [monitoring]
    logging: *default-logging
    # No published port — scraped at blackbox-exporter:9115 internally.

  # ---------------------------------------------------------------------------
  # Loki — log aggregation store.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    command:
      ["-config.file=/etc/loki/loki-config.yml", "-config.expand-env=true"]
    environment:
      LOKI_RETENTION_HOURS: ${LOKI_RETENTION_HOURS:-336h}
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    networks: [monitoring]
    logging: *default-logging
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Promtail — ships Docker container logs to Loki. Drops PHI/secret fields.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [monitoring]
    depends_on: [loki]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Uptime Kuma — self-hosted synthetic uptime + status page.
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - uptimekuma_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${UPTIME_KUMA_PORT:-3002}:3001"
    networks: [monitoring]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Bull Board — BullMQ queue dashboard. Medusa v2's Redis event bus + workflow
  # engine run on BullMQ; Bull Board auto-discovers those queues on the Redis.
  # ---------------------------------------------------------------------------
  bull-board:
    image: deadly0/bull-board:3.2.6
    restart: unless-stopped
    environment:
      REDIS_HOST: ${BULL_REDIS_HOST:-redis}
      REDIS_PORT: ${BULL_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${BULL_REDIS_PASSWORD:-}
      REDIS_USE_TLS: "false"
      BULL_PREFIX: bull
      USER_LOGIN: ${BULL_BOARD_USER:-admin}
      USER_PASSWORD: ${BULL_BOARD_PASSWORD:-change_me_bullboard}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${BULL_BOARD_PORT:-3003}:3000"
    networks: [monitoring, app]
    logging: *default-logging
