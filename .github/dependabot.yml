# Dependabot — automated dependency + security updates for Saludlink.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # --- pnpm workspace (root) -------------------------------------------------
  # Dependabot reads the workspace + lockfile from the repo root; a single npm
  # ecosystem entry at "/" covers all workspace packages.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    labels: ["dependencies", "security"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Majors are reviewed deliberately, not auto-proposed.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions --------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["ci", "security"]
    commit-message:
      prefix: "chore(ci)"

  # --- Docker base images (monitoring stack) ---------------------------------
  - package-ecosystem: "docker"
    directory: "/infra/monitoring"
    schedule:
      interval: "weekly"
    labels: ["docker", "security"]
    commit-message:
      prefix: "chore(docker)"
