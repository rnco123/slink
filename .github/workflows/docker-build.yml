# Docker image build check (roadmap task 69).
#
# Verifies BOTH production Dockerfiles actually build from a clean checkout —
# no push, no registry. This is the CI counterpart to the local build-verify
# deferred in task 7: catches a broken Dockerfile / missing build stage / bad
# COPY path before deploy time, without the cost/secrets of pushing to GHCR
# (that's deploy.yml's job, owned by the deploy session).
#
# Both images build with the REPO ROOT as context (the monorepo lockfile +
# workspace packages live above each app dir), so `context: .` with an explicit
# `file:` per image.
name: docker-build

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/storefront/**"
      - "apps/medusa/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: storefront
            file: apps/storefront/Dockerfile
            # Public build args are baked into the Next bundle; dummy values are
            # fine for a build-only verification.
            build-args: |
              NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_ci_placeholder
              NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
              NEXT_PUBLIC_BASE_URL=http://localhost:8000
          - name: medusa
            file: apps/medusa/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: false
          build-args: ${{ matrix.build-args }}
          # Cache layers between runs to keep the check fast.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
