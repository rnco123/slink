# OWASP ZAP baseline (DAST) — Saludlink.
# Runs against a LIVE target (staging by default), so it is manual/scheduled, not
# on every PR. The baseline scan is passive + safe (no active attack payloads),
# suitable to run against a deployed staging environment.
name: dast-zap

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (must be a non-production staging URL)"
        required: true
        default: "https://staging.saludlinkusa.com"
  schedule:
    - cron: "0 3 * * 1" # weekly, Mondays 03:00 UTC

permissions:
  contents: read
  issues: write # ZAP action opens/updates a tracking issue with findings

jobs:
  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://staging.saludlinkusa.com' }}
          # Rules config lets us mark known-acceptable warnings as WARN/IGNORE.
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a" # include the alpha passive rules
          allow_issue_writing: true
          fail_action: false # report, don't block (baseline is advisory)
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
