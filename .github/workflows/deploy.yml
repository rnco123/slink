# Deploy — build the storefront + medusa images, push to GHCR, then roll the box.
#
# FULLY AUTOMATIC. Every push to `main` (i.e. every merged PR) rebuilds the two
# images and rolls the live box. No manual step, no SSH keys stored in GitHub, no
# firewall holes:
#
#   • `images`  runs on a GitHub-hosted runner — builds + pushes to GHCR.
#   • `deploy`  runs on a SELF-HOSTED runner installed ON the box, so it just runs
#     `docker compose pull && up` locally. The box reaches OUT to GitHub; nothing
#     reaches in. That is why we don't need to open SSH to GitHub's IP ranges.
#
# `main` is protected (CI required before merge), so whatever lands here is already
# green. Use the "Run workflow" button for a manual redeploy.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Never roll the box with two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: rnco123

jobs:
  images:
    name: build + push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Medusa image (no build args) -------------------------------------
      - name: Build + push medusa
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/medusa/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/slink-medusa:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/slink-medusa:${{ github.sha }}
          cache-from: type=gha,scope=medusa
          cache-to: type=gha,mode=max,scope=medusa

      # --- Storefront image (NEXT_PUBLIC_* are build args, baked into bundle) -
      - name: Build + push storefront
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY || 'pk_replace_after_seed' }}
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://manage.saludlinkusa.com
            NEXT_PUBLIC_BASE_URL=https://saludlinkusa.com
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/slink-storefront:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/slink-storefront:${{ github.sha }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

  # ---------------------------------------------------------------------------
  # Roll the box. Runs ON the box via a self-hosted runner labelled `slink-box`,
  # so it needs no SSH/keys — it operates on the local /opt/slink compose project.
  # The `medusa-migrate` one-shot applies migrations before server/worker start.
  # ---------------------------------------------------------------------------
  deploy:
    name: roll the box
    needs: [images]
    runs-on: [self-hosted, slink-box]
    steps:
      - name: Pull latest images + roll
        run: |
          set -euo pipefail
          cd /opt/slink
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

      - name: Health check (fail the deploy if the API doesn't come up)
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://manage.saludlinkusa.com/health || true)
            if [ "$code" = "200" ]; then
              echo "✅ medusa healthy (HTTP 200)"
              exit 0
            fi
            echo "waiting for medusa to come up… ($i/30, last=$code)"
            sleep 5
          done
          echo "❌ medusa did not return 200 within 150s"
          exit 1
