# Lighthouse CI + PageSpeed Insights — Saludlink.
# Enforces the plan's perf/SEO budgets (Perf >=95, SEO 100, LCP <2.0s,
# CLS <0.05) on the storefront. Two paths:
#   * lhci  — builds + serves the storefront and runs Lighthouse locally in CI.
#   * psi   — pulls field/lab data from the Google PageSpeed Insights API for a
#             deployed URL (staging/prod), feeding the Monitoring API.
name: lighthouse

on:
  pull_request:
    paths:
      - "apps/storefront/**"
      - ".github/workflows/lighthouse.yml"
      - "lighthouserc.json"
  workflow_dispatch:
    inputs:
      psi_url:
        description: "Deployed URL for a PageSpeed Insights run"
        required: false
        default: "https://staging.saludlinkusa.com"

permissions:
  contents: read

jobs:
  lhci:
    name: Lighthouse CI (local budgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build storefront
        run: pnpm --filter storefront build
        env:
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_test
          NEXT_PUBLIC_BASE_URL: http://localhost:8000
      - name: Run Lighthouse CI
        run: |
          pnpm dlx @lhci/cli@0.14.x autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  psi:
    name: PageSpeed Insights (deployed URL)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Query PageSpeed Insights API
        env:
          PSI_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          URL: ${{ github.event.inputs.psi_url }}
        run: |
          curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=mobile&category=performance&category=seo&category=accessibility&category=best-practices&key=${PSI_KEY}" \
            -o psi-mobile.json
          echo "Performance:  $(jq '.lighthouseResult.categories.performance.score' psi-mobile.json)"
          echo "SEO:          $(jq '.lighthouseResult.categories.seo.score' psi-mobile.json)"
          echo "LCP:          $(jq -r '.lighthouseResult.audits[\"largest-contentful-paint\"].displayValue' psi-mobile.json)"
          echo "CLS:          $(jq -r '.lighthouseResult.audits[\"cumulative-layout-shift\"].displayValue' psi-mobile.json)"
      - uses: actions/upload-artifact@v4
        with:
          name: psi-report
          path: psi-mobile.json
