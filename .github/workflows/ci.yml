# Continuous integration — Saludlink.
# The security workflows scan the repo but never COMPILE it; this workflow is the
# actual correctness gate: format → lint → typecheck → build → unit tests across
# the whole pnpm/turbo workspace on every push to main and every PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # Public build-time env baked into the storefront bundle. Dummy values are fine
  # for COMPILATION — real values are injected at deploy time. check-env-variables.js
  # hard-requires the publishable key at build.
  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_placeholder
  NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
  NEXT_PUBLIC_BASE_URL: http://localhost:8000
  # `medusa build` reads medusa-config at build time (it compiles, it does NOT
  # connect to Postgres/Redis), so dummy connection strings + secrets are enough.
  DATABASE_URL: postgres://ci:ci@localhost:5432/medusa
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci_placeholder_jwt_secret
  COOKIE_SECRET: ci_placeholder_cookie_secret
  STORE_CORS: http://localhost:8000
  ADMIN_CORS: http://localhost:9000
  AUTH_CORS: http://localhost:8000,http://localhost:9000

jobs:
  quality:
    name: format · lint · typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      # Fail if a zod-validated env var is undocumented in its .env.template
      # (roadmap task 60). Keeps the env contract and the code in lockstep.
      - name: Env template drift check
        run: pnpm check:env

      - name: Lint
        run: pnpm turbo run lint

      # Build BEFORE typecheck: `medusa build` generates .medusa/types/* which
      # the Medusa tsconfig references (e.g. query-entry-points in seed.ts). A
      # fresh CI checkout has no generated types, so typecheck must run after.
      - name: Build
        run: pnpm turbo run build

      # Bundle-size regression budget (roadmap task 57). Reuses the storefront
      # build above (reads apps/storefront/.next/app-build-manifest.json) and
      # fails if the heaviest route's gzipped First Load JS exceeds the budget.
      - name: Bundle-size budget
        run: pnpm check:bundle
        env:
          BUNDLE_BUDGET_KB: "460"

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Unit tests
        run: pnpm turbo run test

  # ---------------------------------------------------------------------------
  # Medusa HTTP integration tests (roadmap task 86). Boots the real Medusa app
  # in-process against a throwaway DB (medusa-test-utils + pg-god) and exercises
  # the store/admin API surfaces — content CRUD, product reviews, rate limiting,
  # health. This makes the http integration suite a CI gate, not just a local run.
  #
  # SSL/localhost (Session 4's fix, see integration-tests/setup.js): medusa-test-
  # utils forces `ssl: { rejectUnauthorized: false }` for any DB_HOST that is NOT
  # "localhost", and a plain (non-SSL) Postgres then hangs at boot. So the service
  # MUST be reached as `localhost` (not 127.0.0.1). pg-god needs a superuser to
  # create/drop the temp DBs — the service's POSTGRES_USER is one.
  integration-http:
    name: medusa integration (http)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saludlink
          POSTGRES_PASSWORD: saludlink_local
          POSTGRES_DB: medusa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saludlink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # DB_* (not DATABASE_URL) is what test-utils/pg-god build the throwaway DB
      # from. DB_HOST MUST contain "localhost" (SSL note above).
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USERNAME: saludlink
      DB_PASSWORD: saludlink_local
      DATABASE_URL: postgres://saludlink:saludlink_local@localhost:5432/medusa
      JWT_SECRET: ci_placeholder_jwt_secret
      COOKIE_SECRET: ci_placeholder_cookie_secret
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run HTTP integration tests
        run: pnpm --filter @saludlink/medusa test:integration:http
