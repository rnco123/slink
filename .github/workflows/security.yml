# Security scanning — Saludlink.
# Runs the SAST / secret / dependency / container scanners on every PR + push to
# main, plus a weekly scheduled deep scan. Results upload to the GitHub Security
# tab (code scanning) via SARIF so the future Monitoring API can read findings
# through the GitHub code-scanning API.
name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — weekly deep scan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # required to upload SARIF to the Security tab

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Gitleaks — secret scanning across the repo + full git history.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0 # full history so historical leaks are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
        # Fails the job on any finding. Enterprise licence optional; OSS action
        # runs without a licence for public repos.

  # ---------------------------------------------------------------------------
  # Semgrep Community Edition — SAST with curated rulesets.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # HARD GATE (task 30 triage complete). A one-time triage of the security
      # rulesets (p/security-audit + p/secrets + p/nextjs + p/owasp-top-ten,
      # excluding tests) found ZERO ERROR-severity findings across the whole
      # repo — every finding was WARNING, and all were the single best-practice
      # rule `github-actions-mutable-action-tag` (pin actions to a commit SHA).
      # So we gate on ERROR severity (semgrep's high-confidence tier): a real
      # SAST finding fails CI, while the best-practice/style WARNINGs stay
      # report-only (next step) instead of blocking on noise. SHA-pinning the
      # actions is tracked separately (not blanket-nosemgrep'd here — the fix is
      # to pin, not to suppress).
      - name: Semgrep gate (ERROR severity fails the build)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/nextjs \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            --exclude '*.test.ts' --exclude '*.spec.ts'
        env:
          SEMGREP_SEND_METRICS: "off" # privacy: no telemetry

      # Full report (all severities) → SARIF for the Security tab. Report-only:
      # WARNING/INFO best-practice findings are visible but don't block.
      - name: Semgrep full report (all severities, non-blocking)
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/nextjs \
            --config p/owasp-top-ten \
            --sarif --output semgrep.sarif \
            --exclude '*.test.ts' --exclude '*.spec.ts'
        env:
          SEMGREP_SEND_METRICS: "off" # privacy: no telemetry
      - name: Upload Semgrep SARIF
        # Code scanning (SARIF upload) requires GitHub Advanced Security, which is
        # not available on a private repo without a paid plan. Keep the scan as a
        # gate but don't fail the workflow on the upload; the Security tab
        # populates automatically once the repo is public / GHAS is enabled.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # npm audit — dependency vulnerability report over the pnpm workspace.
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (high+ fails the build)
        run: pnpm audit --audit-level=high
      - name: Full JSON report (artifact for the Monitoring API)
        if: always()
        run: pnpm audit --json > npm-audit.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.json

  # ---------------------------------------------------------------------------
  # Trivy — filesystem + config (IaC/Dockerfile) vulnerability + misconfig scan.
  # ---------------------------------------------------------------------------
  trivy:
    name: trivy (vulns + IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        # See Semgrep note above — SARIF upload needs GHAS (public/paid); keep the
        # scan as a gate but don't fail the workflow on the private-repo upload.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy
